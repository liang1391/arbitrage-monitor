version: '1.0'
name: arbitrage-monitor
displayName: 套利监控（RSS模式·每15分钟）
triggers:
  trigger: schedule
  schedule:
    # 每15分钟（北京时间 8:00-23:59）
    cron: '*/15 0-15 * * *'

stages:
  - name: monitor
    displayName: 抓取好价并推送微信
    steps:
      - step: build@python
        name: run-monitor
        displayName: 运行监控
        pythonVersion: '3.12'
        commands:
          - pip install requests feedparser pyyaml
          - export WECHAT_SENDKEYS="$WECHAT_SENDKEYS"
          - python monitor.py --once --config config.example.yaml
