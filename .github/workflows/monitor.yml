name: 套利监控

on:
  schedule:
    # 每15分钟运行一次（北京时间 8:00-23:59）
    - cron: '*/15 0-15 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install-deps chromium
          playwright install chromium

      - name: Restore deal database
        uses: actions/cache@v4
        with:
          path: data/deals.db
          key: deals-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            deals-${{ runner.os }}-

      - name: Run monitor
        env:
          WECHAT_SENDKEYS: ${{ secrets.WECHAT_SENDKEYS }}
        run: |
          mkdir -p data logs
          python monitor.py --once --config config.example.yaml
